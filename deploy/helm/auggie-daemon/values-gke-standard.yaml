# GKE Standard profile. Disable the selector for node pools not using WIF.
platform:
  mode: gkeStandard
  gkeStandard:
    workloadIdentityNodeSelector:
      enabled: true

resources:
  requests:
    cpu: 500m
    memory: 1Gi
    ephemeral-storage: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi
    ephemeral-storage: 4Gi
