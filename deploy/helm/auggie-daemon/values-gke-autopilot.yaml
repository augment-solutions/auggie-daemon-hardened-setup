# GKE Autopilot profile. It intentionally has no Standard WIF node selector.
platform:
  mode: gkeAutopilot

nodeSelector: {}

# Explicit, Autopilot-compatible requests and limits for main and init containers.
resources:
  requests:
    cpu: 500m
    memory: 1Gi
    ephemeral-storage: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi
    ephemeral-storage: 4Gi

initResources:
  requests:
    cpu: 250m
    memory: 512Mi
    ephemeral-storage: 1Gi
  limits:
    cpu: "1"
    memory: 2Gi
    ephemeral-storage: 4Gi
