{{- $validated := include "auggie-daemon.validate" . -}}
{{- if and (eq .Values.credentials.mode "secretProviderClass") .Values.credentials.secretProviderClass.create }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "auggie-daemon.secretProviderClassName" . }}
  labels:
    {{- include "auggie-daemon.labels" . | nindent 4 }}
spec:
  provider: gke
  parameters:
    secrets: |
      {{- toYaml .Values.credentials.secretProviderClass.secrets | nindent 6 }}
{{- end }}
