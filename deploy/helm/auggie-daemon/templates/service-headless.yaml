{{- $validated := include "auggie-daemon.validate" . -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "auggie-daemon.headlessServiceName" . }}
  labels:
    {{- include "auggie-daemon.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  clusterIP: None
  publishNotReadyAddresses: {{ .Values.service.publishNotReadyAddresses }}
  selector:
    {{- include "auggie-daemon.selectorLabels" . | nindent 4 }}
