{{- $validated := include "auggie-daemon.validate" . -}}
{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "auggie-daemon.fullname" . }}
  labels:
    {{- include "auggie-daemon.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "auggie-daemon.selectorLabels" . | nindent 6 }}
  {{- if ne .Values.podDisruptionBudget.minAvailable nil }}
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  {{- end }}
  {{- if ne .Values.podDisruptionBudget.maxUnavailable nil }}
  maxUnavailable: {{ .Values.podDisruptionBudget.maxUnavailable }}
  {{- end }}
{{- end }}
